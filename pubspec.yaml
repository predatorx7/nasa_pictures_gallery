name: nasa_pictures
description: A simple app to browse nasa astronomy pictures from apod
publish_to: 'none'
version: 0.0.3+22080008

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  intl: ^0.20.2
  fluentui_system_icons: ^1.1.273
  fade_shimmer: ^2.4.0
  google_fonts: ^8.2.0
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  quiver: ^3.2.2
  equatable: ^2.1.0
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  logging: ^1.3.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  drift: ^2.34.2
  path: ^1.9.1
  path_provider: ^2.1.6
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.15.0
  freezed: ^4.0.0-dev.3
  mocktail_image_network: ^1.3.0
  drift_dev: ^2.34.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/brand/
